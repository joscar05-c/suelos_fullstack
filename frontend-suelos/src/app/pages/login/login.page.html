<ion-header [translucent]="true">
  <ion-toolbar color="success">
    <ion-title>Iniciar Sesión</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="login-container">
    <div class="logo-section">
      <ion-icon name="leaf" color="success" class="logo-icon"></ion-icon>
      <h1>Sistema de Suelos</h1>
      <p>Gestiona tus chacras y análisis</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <ion-item lines="full">
        <ion-label position="floating">Email</ion-label>
        <ion-input
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
        ></ion-input>
      </ion-item>

      <ion-item lines="full">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input
          type="password"
          formControlName="password"
          placeholder="Mínimo 6 caracteres"
        ></ion-input>
      </ion-item>

      @if (errorMessage) {
        <ion-text color="danger" class="error-message">
          <p>{{ errorMessage }}</p>
        </ion-text>
      }

      <ion-button
        expand="block"
        type="submit"
        [disabled]="!loginForm.valid || loading"
        class="login-button"
        >
        @if (loading) {
          <ion-spinner name="circles"></ion-spinner>
        }
        @if (!loading) {
          <span>Ingresar</span>
        }
      </ion-button>

      <div class="links-section">
        <ion-button fill="clear" (click)="goToRegister()">
          ¿No tienes cuenta? Regístrate
        </ion-button>

        <ion-button fill="clear" (click)="goToCalculator()" color="medium">
          <ion-icon slot="start" name="calculator"></ion-icon>
          Continuar sin cuenta
        </ion-button>
      </div>
    </form>
  </div>
</ion-content>
